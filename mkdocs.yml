site_name: Pleasure Island Design — Technical Reference
site_url: https://willyd61.github.io/pleasureislanddesign.com/
site_author: Pleasure Island Design LLC
site_description: Technical documentation, white papers, and operational guides for pleasureislanddesign.com

repo_name: willyd61/pleasureislanddesign.com
repo_url: https://github.com/willyd61/pleasureislanddesign.com
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 Pleasure Island Design LLC — Apache 2.0 License

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Lato
    code: Fira Code
  logo: img/pid-logo-small.jpg
  favicon: favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.copy
    - toc.integrate

extra_css:
  - docs/assets/mkdocs-overrides.css

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/pidnrayment/
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/pleasureislanddesign/
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/pleasureislanddesign/
    - icon: fontawesome/brands/github
      link: https://github.com/willyd61/pleasureislanddesign.com

nav:
  - Home: docs/index.md
  - White Paper:
    - Overview: docs/whitepaper/overview.md
    - Business Model: docs/whitepaper/business-model.md
    - Brand Guidelines: docs/whitepaper/brand-guidelines.md
    - Service Standards: docs/whitepaper/service-standards.md
  - Technical Reference:
    - Architecture: docs/technical/architecture.md
    - CI/CD Pipeline: docs/technical/cicd.md
    - Design System: docs/technical/design-system.md
    - GitHub Pages: docs/technical/github-pages.md
    - Deployment: docs/technical/deployment.md
  - Operations:
    - Contributing: CONTRIBUTING.md
    - Security: SECURITY.md
    - Deployment Guide: DEPLOYMENT.md
    - Code of Conduct: CODE_OF_CONDUCT.md
  - Release Notes: docs/release-notes.md
